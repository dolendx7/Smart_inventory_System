{% extends "base.html" %}
{% block title %}Reports - InvenLogic Pro{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="fas fa-file-alt"></i> Reports</h1>
</div>
<div class="stats-grid">
    <a href="{{ url_for('inventory_report') }}" class="card" style="text-decoration: none; color: inherit;">
        <div class="stat-icon primary">
            <i class="fas fa-warehouse"></i>
        </div>
        <div>
            <h3>Inventory Report</h3>
            <p class="text-muted">View all products and stock levels</p>
        </div>
    </a>
    <a href="{{ url_for('sales_report') }}" class="card" style="text-decoration: none; color: inherit;">
        <div class="stat-icon success">
            <i class="fas fa-chart-line"></i>
        </div>
        <div>
            <h3>Sales Report</h3>
            <p class="text-muted">Analyze sales performance</p>
        </div>
    </a>
    <a href="{{ url_for('financial_report') }}" class="card" style="text-decoration: none; color: inherit;">
        <div class="stat-icon warning">
            <i class="fas fa-dollar-sign"></i>
        </div>
        <div>
            <h3>Financial Report</h3>
            <p class="text-muted">Revenue and financial metrics</p>
        </div>
    </a>
</div>
{% endblock %}
