{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product - InvenLogic Pro{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-{{ 'edit' if product else 'plus' }}"></i> 
        {{ 'Edit' if product else 'Add New' }} Product
    </h1>
</div>
<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">SKU *</label>
                <input type="text" class="form-control" name="sku" value="{{ product.sku if product else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Product Name *</label>
                <input type="text" class="form-control" name="product_name" value="{{ product.product_name if product else '' }}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description">{{ product.description if product else '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Category *</label>
                <input type="text" class="form-control" name="category" value="{{ product.category if product else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Unit Price *</label>
                <input type="number" step="0.01" class="form-control" name="unit_price" value="{{ product.unit_price if product else '' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Stock Quantity *</label>
                <input type="number" class="form-control" name="stock_quantity" value="{{ product.stock_quantity if product else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Reorder Level *</label>
                <input type="number" class="form-control" name="reorder_level" value="{{ product.reorder_level if product else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Max Stock Level *</label>
                <input type="number" class="form-control" name="max_stock_level" value="{{ product.max_stock_level if product else '' }}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Supplier</label>
            <select class="form-control" name="supplier_id">
                <option value="">Select Supplier</option>
                {% for supplier in suppliers %}
                <option value="{{ supplier.id }}" {% if product and product.supplier_id == supplier.id %}selected{% endif %}>
                    {{ supplier.supplier_name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> {{ 'Update' if product else 'Save' }} Product
            </button>
            <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
