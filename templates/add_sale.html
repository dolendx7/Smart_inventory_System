{% extends "base.html" %}
{% block title %}Add Sale - InvenLogic Pro{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="fas fa-plus-circle"></i> Add New Sale</h1>
    <div class="header-actions">
        <a href="{{ url_for('sales') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Sales
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form id="add-sale-form" method="POST" action="{{ url_for('add_sale') }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="buyer" class="form-label">Buyer *</label>
                    <select name="buyer_id" id="buyer" class="form-control" required>
                        <option value="">Select Buyer</option>
                        {% for buyer in buyers %}
                            <option value="{{ buyer.id }}">{{ buyer.buyer_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="sale_date" class="form-label">Sale Date *</label>
                    <input type="date" name="sale_date" id="sale_date" class="form-control" value="{{ today }}" required>
                </div>

                <div class="form-group">
                    <label for="status" class="form-label">Status *</label>
                    <select name="status" id="status" class="form-control">
                        <option value="Pending" selected>Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="payment_method" class="form-label">Payment Method *</label>
                    <select name="payment_method" id="payment_method" class="form-control" required>
                        <option value="Cash" selected>Cash</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Cheque">Cheque</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="notes" class="form-label">Notes</label>
                <textarea name="notes" id="notes" class="form-control" rows="3" placeholder="Add any additional notes about this sale..."></textarea>
            </div>

            <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Sale Items</h3>
            
            <div class="table-container">
                <table class="table" id="items-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">Product</th>
                            <th style="width: 15%;">Unit Price</th>
                            <th style="width: 15%;">Quantity</th>
                            <th style="width: 15%;">Subtotal</th>
                            <th style="width: 15%;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- JavaScript will populate rows -->
                    </tbody>
                </table>
            </div>

            <button type="button" id="add-item" class="btn btn-secondary" style="margin-bottom: 1rem;">
                <i class="fas fa-plus"></i> Add Product
            </button>

            <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0;">Total Amount:</h3>
                    <h2 style="margin: 0; color: var(--primary);">₹<span id="total-amount">0.00</span></h2>
                </div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Sale
                </button>
                <a href="{{ url_for('sales') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
    // Add initial row
    addProductRow();

    function addProductRow() {
        var row = `<tr>
            <td>
                <select class="product-select form-control" required>
                    <option value="">Select Product</option>
                    {% for product in products %}
                        <option value="{{ product.id }}" 
                            data-price="{{ product.unit_price }}" 
                            data-stock="{{ product.stock_quantity }}"
                            data-name="{{ product.product_name }}">
                            {{ product.product_name }} - {{ product.sku }} (Stock: {{ product.stock_quantity }})
                        </option>
                    {% endfor %}
                </select>
            </td>
            <td class="unit-price" style="vertical-align: middle; font-weight: 600;">₹0.00</td>
            <td>
                <input type="number" class="quantity form-control" value="1" min="1" required>
            </td>
            <td class="subtotal" style="vertical-align: middle; font-weight: 600;">₹0.00</td>
            <td>
                <button type="button" class="btn btn-danger btn-sm remove-item">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>`;
        $('#items-table tbody').append(row);
    }

    // Recalculate subtotal for a row
    function recalcSubtotal(row){
        var selectedOption = row.find('.product-select option:selected');
        var price = parseFloat(selectedOption.data('price')) || 0;
        var stock = parseInt(selectedOption.data('stock')) || 0;
        var qty = parseInt(row.find('.quantity').val()) || 0;
        
        // Check if quantity exceeds stock
        if (qty > stock && stock > 0) {
            alert('Warning: Quantity (' + qty + ') exceeds available stock (' + stock + ') for ' + selectedOption.data('name'));
        }
        
        var subtotal = price * qty;
        row.find('.unit-price').text('₹' + price.toFixed(2));
        row.find('.subtotal').text('₹' + subtotal.toFixed(2));
        recalcTotal();
    }

    // Recalculate total amount
    function recalcTotal(){
        var total = 0;
        $('#items-table tbody tr').each(function(){
            var subtotalText = $(this).find('.subtotal').text().replace('₹', '');
            total += parseFloat(subtotalText) || 0;
        });
        $('#total-amount').text(total.toFixed(2));
    }

    // On product or quantity change
    $('#items-table').on('change', '.product-select, .quantity', function(){
        var row = $(this).closest('tr');
        recalcSubtotal(row);
    });

    // Remove a row
    $('#items-table').on('click', '.remove-item', function(){
        if ($('#items-table tbody tr').length > 1) {
            $(this).closest('tr').remove();
            recalcTotal();
        } else {
            alert('Cannot remove the last item. A sale must have at least one item.');
        }
    });

    // Add new product row
    $('#add-item').click(function(){
        addProductRow();
    });

    // Submit form with traditional POST
    $('#add-sale-form').submit(function(e){
        e.preventDefault();

        // Validation
        if (!$('#buyer').val()) {
            alert('Please select a buyer');
            return false;
        }

        var hasError = false;
        var hasEmptyProduct = false;
        var itemCount = 0;

        // Remove any existing hidden fields
        $('input[name="product_id[]"]').remove();
        $('input[name="quantity[]"]').remove();
        $('input[name="unit_price[]"]').remove();
        $('input[name="subtotal[]"]').remove();

        $('#items-table tbody tr').each(function(){
            var productId = $(this).find('.product-select').val();
            var quantity = parseInt($(this).find('.quantity').val());
            var unitPrice = parseFloat($(this).find('.product-select option:selected').data('price'));
            var subtotalText = $(this).find('.subtotal').text().replace('₹', '');
            var subtotal = parseFloat(subtotalText);

            if (!productId) {
                hasEmptyProduct = true;
                return false;
            }

            if (isNaN(quantity) || quantity < 1) {
                hasError = true;
                return false;
            }

            // Add hidden fields for this item to the form (not the row)
            $('#add-sale-form').append($('<input>').attr({
                type: 'hidden',
                name: 'product_id[]',
                value: productId
            }));
            
            $('#add-sale-form').append($('<input>').attr({
                type: 'hidden',
                name: 'quantity[]',
                value: quantity
            }));
            
            $('#add-sale-form').append($('<input>').attr({
                type: 'hidden',
                name: 'unit_price[]',
                value: unitPrice
            }));
            
            $('#add-sale-form').append($('<input>').attr({
                type: 'hidden',
                name: 'subtotal[]',
                value: subtotal
            }));

            itemCount++;
        });

        if (hasEmptyProduct) {
            alert('Please select a product for all items or remove empty rows');
            return false;
        }

        if (hasError) {
            alert('Please enter valid quantities for all items');
            return false;
        }

        if (itemCount === 0) {
            alert('Please add at least one item to the sale');
            return false;
        }

        // Add total amount as hidden field
        $('#add-sale-form').append($('<input>').attr({
            type: 'hidden',
            name: 'total_amount',
            value: parseFloat($('#total-amount').text())
        }));

        // Disable submit button to prevent double submission
        var submitBtn = $(this).find('button[type="submit"]');
        submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Saving...');

        // Submit the form normally
        this.submit();
    });
});
</script>

<style>
.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    margin-bottom: 1rem;
}

.table td {
    vertical-align: middle;
}

.product-select {
    width: 100%;
}

@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .table-container {
        overflow-x: auto;
    }
}
</style>

{% endblock %}
